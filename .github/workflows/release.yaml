name: Publish release

on:
  release:
    types: [created]

jobs:
  publish-crate:
    name: Publish crate

    runs-on: ubuntu-latest

    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache toolchain and dependencies
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        name: Authenticate to crates.io (trusted publishing)
      - name: Verify all crates can be published (dry-run)
        run: cargo publish --locked --workspace --exclude quincy-tests --dry-run
      - name: Publish crates to crates.io
        run: cargo publish --locked --workspace --exclude quincy-tests
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-linux:
    name: Build Linux

    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache toolchain and dependencies
      - name: Build x86_64 Linux binaries
        run: |
          cargo build --release --workspace --features jemalloc
          mkdir -p release
          cp target/release/quincy-client release/
          cp target/release/quincy-server release/
          cp target/release/quincy-identity release/
          cp target/release/quincy-client-gui release/
          cp target/release/quincy-client-daemon release/
      - uses: actions/upload-artifact@v4
        name: Upload build artifacts
        with:
          name: linux-binaries
          path: release/

  package-linux:
    name: Package Linux

    runs-on: ubuntu-latest
    needs: build-linux

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache cargo-packager
        with:
          cache-targets: false
          cache-directories: ~/.cargo/bin
      - uses: actions/download-artifact@v4
        name: Download build artifacts
        with:
          name: linux-binaries
          path: target/release/
      - name: Make binaries executable
        run: chmod +x target/release/*
      - name: Create tarball
        run: |
          mkdir -p release
          cp target/release/* release/
          tar zcf quincy-${{ github.ref_name }}-linux-x86_64.tar.gz -C release .
      - name: Install AppImage dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
      - name: Inject version into packager config
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="quincy-gui") | .version')
          sed -i "s/version = \"0.0.0\"/version = \"$VERSION\"/" packager.linux.toml
      - name: Package Linux installers
        run: cargo packager --release -c packager.linux.toml
        env:
          SKIP_BUILD: "1"
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv quincy-${{ github.ref_name }}-linux-x86_64.tar.gz artifacts/
          mv target/release/*.deb artifacts/quincy-${{ github.ref_name }}-linux-x86_64.deb
          mv target/release/*.AppImage artifacts/quincy-${{ github.ref_name }}-linux-x86_64.AppImage
      - uses: softprops/action-gh-release@v1
        name: Add artifacts to release
        with:
          files: artifacts/*

  build-macos:
    name: Build macOS

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache toolchain and dependencies
      - name: Build arm64 macOS binaries
        run: |
          cargo build --release --workspace --features jemalloc
          mkdir -p release
          cp target/release/quincy-client release/
          cp target/release/quincy-server release/
          cp target/release/quincy-identity release/
          cp target/release/quincy-client-gui release/
          cp target/release/quincy-client-daemon release/
      - uses: actions/upload-artifact@v4
        name: Upload build artifacts
        with:
          name: macos-binaries
          path: release/

  package-macos:
    name: Package macOS

    runs-on: macos-latest
    needs: build-macos

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache cargo-packager
        with:
          cache-targets: false
          cache-directories: ~/.cargo/bin
      - uses: actions/download-artifact@v4
        name: Download build artifacts
        with:
          name: macos-binaries
          path: target/release/
      - name: Make binaries executable
        run: chmod +x target/release/*
      - name: Create tarball
        run: |
          mkdir -p release
          cp target/release/* release/
          tar zcf quincy-${{ github.ref_name }}-macos-arm64.tar.gz -C release .
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
      - name: Inject version into packager config
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="quincy-gui") | .version')
          sed -i '' "s/version = \"0.0.0\"/version = \"$VERSION\"/" packager.macos.toml
      - name: Package macOS installer
        run: cargo packager --release -c packager.macos.toml
        env:
          SKIP_BUILD: "1"
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv quincy-${{ github.ref_name }}-macos-arm64.tar.gz artifacts/
          mv target/release/*.dmg artifacts/quincy-${{ github.ref_name }}-macos-arm64.dmg
      - uses: softprops/action-gh-release@v1
        name: Add artifacts to release
        with:
          files: artifacts/*

  build-windows:
    name: Build Windows

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache toolchain and dependencies
      - uses: ilammy/setup-nasm@v1
        name: Install NASM
      - name: Build x86_64 Windows binaries
        run: |
          cargo build --release --workspace
          mkdir ./release
          cp target/release/quincy-client.exe release/
          cp target/release/quincy-server.exe release/
          cp target/release/quincy-identity.exe release/
          cp target/release/quincy-client-gui.exe release/
          cp target/release/quincy-client-daemon.exe release/
      - uses: actions/upload-artifact@v4
        name: Upload build artifacts
        with:
          name: windows-binaries
          path: release/

  package-windows:
    name: Package Windows

    runs-on: windows-latest
    needs: build-windows

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: dtolnay/rust-toolchain@stable
        name: Set up toolchain
      - uses: Swatinem/rust-cache@v2
        name: Cache cargo-packager
        with:
          cache-targets: false
          cache-directories: ~/.cargo/bin
      - uses: actions/download-artifact@v4
        name: Download build artifacts
        with:
          name: windows-binaries
          path: target/release/
      - name: Download wintun
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:TEMP\wintun.zip
          Expand-Archive $env:TEMP\wintun.zip -DestinationPath $env:TEMP\wintun -Force
          cp $env:TEMP\wintun\wintun\bin\amd64\wintun.dll target/release/
      - name: Create zip archive
        run: |
          mkdir ./release
          cp target/release/* release/
          Compress-Archive -Path release/* -DestinationPath quincy-${{ github.ref_name }}-windows-x86_64.zip
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
      - name: Inject version into packager config
        run: |
          $VERSION = (cargo metadata --format-version 1 --no-deps | ConvertFrom-Json).packages | Where-Object { $_.name -eq "quincy-gui" } | Select-Object -ExpandProperty version
          (Get-Content packager.windows.toml) -replace 'version = "0.0.0"', "version = `"$VERSION`"" | Set-Content packager.windows.toml
      - name: Package Windows installer
        run: cargo packager --release -c packager.windows.toml
        env:
          SKIP_BUILD: "1"
          SKIP_WINTUN: "1"
      - name: Collect artifacts
        run: |
          mkdir artifacts
          Move-Item quincy-${{ github.ref_name }}-windows-x86_64.zip artifacts/
          Move-Item target/release/*-setup.exe artifacts/quincy-${{ github.ref_name }}-windows-x86_64-setup.exe
      - uses: softprops/action-gh-release@v1
        name: Add artifacts to release
        with:
          files: artifacts/*

  build-and-package-freebsd:
    name: Build & Package FreeBSD

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
      - uses: vmactions/freebsd-vm@v1
        name: Build and package FreeBSD artifacts
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y curl git cmake gmake pkgconf perl5
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs -o rustup-init.sh
            sh rustup-init.sh -y --profile minimal --default-toolchain stable
          run: |
            . "$HOME/.cargo/env"
            export PATH="/usr/local/bin:${PATH}"
            cargo build --locked --release -p quincy-client -p quincy-server -p quincy-identity --features jemalloc

            mkdir -p release artifacts
            cp target/release/quincy-client release/
            cp target/release/quincy-server release/
            cp target/release/quincy-identity release/
            tar zcf "artifacts/quincy-${{ github.ref_name }}-freebsd-x86_64.tar.gz" -C release .

            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            PREFIX="/usr/local"
            STAGE_DIR="target/freebsd-server-pkg"
            MANIFEST="target/freebsd-server-pkg.manifest"
            ABI="$(pkg config ABI)"
            ARCH="$(printf '%s' "${ABI}" | awk -F: '{ os=tolower($1); if ($3 == "amd64") print os ":" $2 ":x86:64"; else if ($3 == "arm64") print os ":" $2 ":aarch64"; else print tolower($0) }')"

            rm -rf "${STAGE_DIR}"
            mkdir -p \
              "${STAGE_DIR}${PREFIX}/bin" \
              "${STAGE_DIR}${PREFIX}/etc/rc.d" \
              "${STAGE_DIR}${PREFIX}/etc/quincy"

            install -m 0555 target/release/quincy-server "${STAGE_DIR}${PREFIX}/bin/quincy-server"
            install -m 0555 resources/freebsd/quincy.rc "${STAGE_DIR}${PREFIX}/etc/rc.d/quincy"
            sed 's|^users_file = "examples/users.toml"|users_file = "/usr/local/etc/quincy/users.toml"|' \
              examples/server.toml > "${STAGE_DIR}${PREFIX}/etc/quincy/server.toml.sample"
            chmod 0644 "${STAGE_DIR}${PREFIX}/etc/quincy/server.toml.sample"
            install -m 0644 examples/users.toml "${STAGE_DIR}${PREFIX}/etc/quincy/users.toml.sample"

            sed \
              -e "s|@VERSION@|${VERSION}|g" \
              -e "s|@PREFIX@|${PREFIX}|g" \
              -e "s|@ABI@|${ABI}|g" \
              -e "s|@ARCH@|${ARCH}|g" \
              resources/freebsd/MANIFEST.in > "${MANIFEST}"

            pkg create -M "${MANIFEST}" -r "${STAGE_DIR}" -o artifacts
            rm -f "${MANIFEST}"
            mv "artifacts/quincy-server-${VERSION}.pkg" "artifacts/quincy-server-${{ github.ref_name }}-freebsd-x86_64.pkg"

            chmod -R a+rX artifacts
      - uses: softprops/action-gh-release@v1
        name: Add FreeBSD artifacts to release
        with:
          files: artifacts/*

  build-docker-image:
    name: Build Docker image

    runs-on: ubuntu-latest

    steps:
      - uses: docker/setup-qemu-action@v3
        name: Set up QEMU
      - uses: docker/setup-buildx-action@v3
        name: Set up Docker Buildx
      - uses: docker/login-action@v3
        name: Login to Docker Hub
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        name: Build and push
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FEATURES=jemalloc
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/quincy:${{ github.ref_name }}
            ${{ vars.DOCKERHUB_USERNAME }}/quincy:latest
