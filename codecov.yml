ignore:
  # Ignore all app entrypoints because they are not unit/integration tested
  - "**/src/bin/*"
  - "**/src/main.rs"
  # Ignore all network related code because it cannot be unit/integration tested in CI
  - "quincy/src/network"
  # Ignore GUI code because it cannot be unit/integration tested in CI
  - "quincy-gui"
  # Error code is mostly utilised by GUI
  - "quincy/src/error.rs"
  # Command utilities
  - "quincy/src/utils"
  # Metrics code is behind the "metrics" feature which is not enabled in CI and not really useful for coverage
  - "quincy-server/src/server/metrics.rs"
