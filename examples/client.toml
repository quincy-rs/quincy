# The address and port the Quincy server is available at
connection_string = "quincy:55555"

[protocol]
mode = "tls"
# A list of trusted certificate file paths the server can use or have its certificate signed by
trusted_certificate_paths = ["examples/cert/server_cert.pem"]
# A list of trusted certificates as PEM strings
# trusted_certificates = [
#   "-----BEGIN CERTIFICATE-----\nMIIBkjCB...\n-----END CERTIFICATE-----"
# ]
# Path to the client certificate for mutual TLS authentication
client_certificate_file = "examples/cert/client_cert.pem"
# Path to the client certificate private key
client_certificate_key_file = "examples/cert/client_key.pem"

[connection]
# The MTU used by the QUIC tunnel and the spawned TUN interface
mtu = 1400

[network]
routes = [
    "10.0.1.0/24",
    "10.11.12.0/24"
]
dns_servers = [
    "10.0.0.1"
]

[log]
# The log level
level = "info"
